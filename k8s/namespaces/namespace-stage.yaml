apiVersion: v1
kind: Namespace
metadata:
  name: circleguard-stage
  labels:
    environment: stage
    team: circleguard
  annotations:
    # Enrola el namespace en el service mesh: el proxy-injector de Linkerd
    # añade el sidecar a cada pod, habilitando mTLS y métricas automáticas.
    linkerd.io/inject: enabled