# ServiceAccount usado por los workflows de CD de GitHub Actions para
# desplegar en el cluster. El kubeconfig generado para esta SA se guarda
# como GitHub Secret (KUBE_CONFIG_DEV/STAGE/PROD).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-actions-deployer
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: github-actions-deployer-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: github-actions-deployer
  namespace: default
