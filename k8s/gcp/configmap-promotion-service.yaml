apiVersion: v1
kind: ConfigMap
metadata:
  name: promotion-service-config
  namespace: circleguard-dr
data:
  DB_URL: "jdbc:postgresql://postgres:5432/circleguard_promotion"
  DB_USERNAME: "admin"
  NEO4J_URI: "bolt://neo4j:7687"
  NEO4J_USERNAME: "neo4j"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  JWT_EXPIRATION_MS: "3600000"
  SERVER_PORT: "8088"
  CORS_ALLOWED_ORIGINS: "http://localhost:8081,http://localhost:8080"
  ENCOUNTER_WINDOW_DAYS: "14"
  MANDATORY_FENCE_DAYS: "14"
  AUTO_THRESHOLD_SECONDS: "3600"
  BATCH_SIZE: "2000"
  RECOVERED_TTL_DAYS: "30"
  MAC_SESSION_TTL_HOURS: "8"
  GRAPH_RETENTION_DAYS: "14"
