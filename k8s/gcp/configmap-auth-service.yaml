apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: circleguard-dr
data:
  DB_URL: "jdbc:postgresql://postgres:5432/circleguard_auth"
  DB_USERNAME: "admin"
  LDAP_URL: "ldap://host.docker.internal:389"
  LDAP_BASE_DN: "dc=circleguard,dc=edu"
  LDAP_BIND_DN: "cn=admin,dc=circleguard,dc=edu"
  JWT_EXPIRATION_MS: "3600000"
  QR_EXPIRATION_SECONDS: "300"
  SERVER_PORT: "8180"
  CORS_ALLOWED_ORIGINS: "http://localhost:8081,http://localhost:8080"
