apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: circleguard-master
data:
  DB_URL: "${DB_URL}"
  DB_USERNAME: "${DB_USERNAME}"
  LDAP_URL: "${LDAP_URL}"
  LDAP_BASE_DN: "dc=circleguard,dc=edu"
  LDAP_BIND_DN: "${LDAP_BIND_DN}"
  JWT_EXPIRATION_MS: "3600000"
  QR_EXPIRATION_SECONDS: "300"
  SERVER_PORT: "8180"
  CORS_ALLOWED_ORIGINS: "${CORS_ORIGINS}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: identity-service-config
  namespace: circleguard-master
data:
  DB_URL: "${DB_URL}"
  DB_USERNAME: "${DB_USERNAME}"
  SERVER_PORT: "8083"
  CORS_ALLOWED_ORIGINS: "${CORS_ORIGINS}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-service-config
  namespace: circleguard-master
data:
  REDIS_HOST: "redis-prod"
  REDIS_PORT: "6379"
  JWT_EXPIRATION_MS: "3600000"
  QR_EXPIRATION_SECONDS: "300"
  SERVER_PORT: "8087"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: form-service-config
  namespace: circleguard-master
data:
  DB_URL: "${DB_URL}"
  DB_USERNAME: "${DB_USERNAME}"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-prod:9092"
  SERVER_PORT: "8086"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: circleguard-master
data:
  KAFKA_BOOTSTRAP_SERVERS: "kafka-prod:9092"
  MAIL_HOST: "${MAIL_HOST}"
  MAIL_PORT: "${MAIL_PORT}"
  AUTH_SERVICE_URL: "http://auth-service:8180"
  IDENTITY_SERVICE_URL: "http://identity-service:8083"
  JWT_EXPIRATION_MS: "3600000"
  QR_EXPIRATION_SECONDS: "300"
  SERVER_PORT: "8082"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promotion-service-config
  namespace: circleguard-master
data:
  DB_URL: "${DB_URL}"
  DB_USERNAME: "${DB_USERNAME}"
  NEO4J_URI: "bolt://neo4j-prod:7687"
  NEO4J_USERNAME: "${NEO4J_USERNAME}"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-prod:9092"
  REDIS_HOST: "redis-prod"
  REDIS_PORT: "6379"
  JWT_EXPIRATION_MS: "3600000"
  SERVER_PORT: "8088"
  CORS_ALLOWED_ORIGINS: "${CORS_ORIGINS}"
  ENCOUNTER_WINDOW_DAYS: "${ENCOUNTER_WINDOW_DAYS}"
  MANDATORY_FENCE_DAYS: "${MANDATORY_FENCE_DAYS}"
  AUTO_THRESHOLD_SECONDS: "${AUTO_THRESHOLD_SECONDS}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-service-config
  namespace: circleguard-master
data:
  DB_URL: "${DB_URL}"
  DB_USERNAME: "${DB_USERNAME}"
  PROMOTION_SERVICE_URL: "http://promotion-service:8088"
  K_ANONYMITY_THRESHOLD: "5"
  SERVER_PORT: "8084"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: file-service-config
  namespace: circleguard-master
data:
  SERVER_PORT: "8085"
  FILE_UPLOAD_DIR: "${FILE_UPLOAD_DIR}"
