apiVersion: apps/v1
kind: Deployment
metadata:
  name: promotion-service
  namespace: circleguard-master
  annotations:
    kubernetes.io/change-cause: "Release ${RELEASE_VERSION}"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: promotion-service
  template:
    metadata:
      labels:
        app: promotion-service
    spec:
      containers:
      - name: promotion-service
        image: circleguard/promotion-service:${RELEASE_VERSION}
        ports:
        - containerPort: 8088
        env:
        - name: LOGSTASH_HOST
          value: "logstash.observability.svc.cluster.local"
        - name: LOGSTASH_PORT
          value: "5000"
        envFrom:
        - configMapRef:
            name: promotion-service-config
        - secretRef:
            name: circleguard-secrets
        resources:
          requests:
            memory: "1Gi"
            cpu: "1000m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8088
          initialDelaySeconds: 90
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8088
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
---
apiVersion: v1
kind: Service
metadata:
  name: promotion-service
  namespace: circleguard-master
  labels:
    app: promotion-service
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8088
    targetPort: 8088
  selector:
    app: promotion-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: promotion-service-hpa
  namespace: circleguard-master
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: promotion-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
