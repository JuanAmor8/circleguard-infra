apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-exporter
  namespace: observability
  labels:
    app: kafka-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-exporter
  template:
    metadata:
      labels:
        app: kafka-exporter
    spec:
      containers:
        - name: exporter
          image: danielqsj/kafka-exporter:latest
          args: ["--kafka.server=kafka:9092"]
          ports:
            - containerPort: 9308
              name: metrics
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-exporter
  namespace: observability
  labels:
    app: kafka-exporter
spec:
  ports:
    - port: 9308
      name: metrics
  selector:
    app: kafka-exporter
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kafka-exporter
  namespace: observability
  labels:
    release: prometheus-stack
spec:
  selector:
    matchLabels:
      app: kafka-exporter
  endpoints:
    - port: metrics
      interval: 30s
      scrapeTimeout: 10s
