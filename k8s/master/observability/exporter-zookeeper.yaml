apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper-jmx-exporter
  namespace: observability
  labels:
    app: zookeeper-jmx-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper-jmx-exporter
  template:
    metadata:
      labels:
        app: zookeeper-jmx-exporter
    spec:
      containers:
        - name: jmx-exporter
          image: bitnami/jmx-exporter:0.18.0
          args: ["--config", "/etc/jmx-exporter/config.yaml", "9141"]
          ports:
            - containerPort: 9141
              name: jmx-metrics
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper-jmx-exporter
  namespace: observability
  labels:
    app: zookeeper-jmx-exporter
spec:
  ports:
    - port: 9141
      name: metrics
  selector:
    app: zookeeper-jmx-exporter
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: zookeeper-jmx
  namespace: observability
  labels:
    release: prometheus-stack
spec:
  selector:
    matchLabels:
      app: zookeeper-jmx-exporter
  podMetricsEndpoints:
    - port: jmx-metrics
      interval: 30s
      scrapeTimeout: 10s
