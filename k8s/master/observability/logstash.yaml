# Logstash (rúbrica: ELK completo). Recibe los logs JSON estructurados que
# los 8 servicios emiten por su LogstashTcpSocketAppender (logback-spring.xml,
# puerto 5000) y los indexa en Elasticsearch bajo logstash-YYYY.MM.dd.
# Convive con Filebeat: Filebeat recoge stdout de contenedores (capa
# infraestructura), Logstash recibe el stream estructurado de la aplicación.
apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-pipeline
  namespace: observability
data:
  logstash.conf: |
    input {
      tcp {
        port => 5000
        codec => json_lines
      }
    }
    filter {
      if [appName] {
        mutate { rename => { "appName" => "service" } }
      }
    }
    output {
      elasticsearch {
        hosts => ["http://elasticsearch:9200"]
        index => "logstash-%{+YYYY.MM.dd}"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: observability
  labels: { app: logstash }
spec:
  replicas: 1
  selector: { matchLabels: { app: logstash } }
  template:
    metadata: { labels: { app: logstash } }
    spec:
      containers:
        - name: logstash
          image: docker.elastic.co/logstash/logstash:8.15.0
          env:
            - { name: LS_JAVA_OPTS, value: "-Xms256m -Xmx256m" }
            - { name: XPACK_MONITORING_ENABLED, value: "false" }
          ports:
            - { containerPort: 5000, name: tcp-json }
            - { containerPort: 9600, name: api }
          volumeMounts:
            - name: pipeline
              mountPath: /usr/share/logstash/pipeline
          resources:
            requests: { memory: "512Mi", cpu: "250m" }
            limits: { memory: "1Gi", cpu: "1" }
          readinessProbe:
            httpGet: { path: /, port: 9600 }
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: pipeline
          configMap: { name: logstash-pipeline }
---
apiVersion: v1
kind: Service
metadata:
  name: logstash
  namespace: observability
spec:
  selector: { app: logstash }
  ports:
    - { name: tcp-json, port: 5000, targetPort: 5000 }
    - { name: api, port: 9600, targetPort: 9600 }
