apiVersion: v1
kind: ConfigMap
metadata:
  name: circleguard-grafana-dashboards-services
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  circleguard-auth.json: |
    {
      "title": "CircleGuard \u2014 auth-service",
      "uid": "cg-svc-auth",
      "schemaVersion": 39,
      "editable": true,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "tags": [
        "circleguard",
        "service"
      ],
      "templating": {
        "list": []
      },
      "annotations": {
        "list": []
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Request rate (req/s)",
          "datasource": "Prometheus",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{application=\"circleguard-auth-service\"}[5m]))",
              "legendFormat": "circleguard-auth-service",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Error rate 5xx (req/s)",
          "datasource": "Prometheus",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{application=\"circleguard-auth-service\",status=~\"5..\"}[5m]))",
              "legendFormat": "circleguard-auth-service",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Latencia P95 (s)",
          "datasource": "Prometheus",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{application=\"circleguard-auth-service\"}[5m])) by (le))",
              "legendFormat": "circleguard-auth-service",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "JVM heap usado (%)",
          "datasource": "Prometheus",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "100 * sum(jvm_memory_used_bytes{application=\"circleguard-auth-service\",area=\"heap\"}) / sum(jvm_memory_max_bytes{application=\"circleguard-auth-service\",area=\"heap\"})",
              "legendFormat": "circleguard-auth-service",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "CPU del proceso (%)",
          "datasource": "Prometheus",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 16
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "100 * process_cpu_usage{application=\"circleguard-auth-service\"}",
              "legendFormat": "circleguard-auth-service",
              "refId": "A"
            }
          ]
        }
      ]
    }
