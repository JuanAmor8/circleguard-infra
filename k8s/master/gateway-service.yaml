apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: circleguard-master
  annotations:
    kubernetes.io/change-cause: "Release ${RELEASE_VERSION}"
spec:
  replicas: 5
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
      - name: gateway-service
        image: circleguard/gateway-service:${RELEASE_VERSION}
        ports:
        - containerPort: 8087
        env:
        - name: LOGSTASH_HOST
          value: "logstash.observability.svc.cluster.local"
        - name: LOGSTASH_PORT
          value: "5000"
        envFrom:
        - configMapRef:
            name: gateway-service-config
        - secretRef:
            name: circleguard-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8087
          initialDelaySeconds: 45
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8087
          initialDelaySeconds: 20
          periodSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: circleguard-master
  labels:
    app: gateway-service
spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 80
    targetPort: 8087
  selector:
    app: gateway-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-service-hpa
  namespace: circleguard-master
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway-service
  minReplicas: 5
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
