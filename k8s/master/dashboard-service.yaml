apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-service
  namespace: circleguard-master
  annotations:
    kubernetes.io/change-cause: "Release ${RELEASE_VERSION}"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: dashboard-service
  template:
    metadata:
      labels:
        app: dashboard-service
        environment: production
    spec:
      containers:
      - name: dashboard-service
        image: circleguard/dashboard-service:${RELEASE_VERSION}
        ports:
        - containerPort: 8084
        envFrom:
        - configMapRef:
            name: dashboard-service-config
        - secretRef:
            name: circleguard-secrets
        env:
        - name: LOGSTASH_HOST
          value: "logstash.observability.svc.cluster.local"
        - name: LOGSTASH_PORT
          value: "5000"
        - name: JAVA_OPTS
          value: "-Xmx512m -Xms256m -XX:+UseG1GC"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8084
          initialDelaySeconds: 60
          periodSeconds: 15
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8084
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
  namespace: circleguard-master
  labels:
    app: dashboard-service
spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 8084
    targetPort: 8084
    protocol: TCP
  selector:
    app: dashboard-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dashboard-service-hpa
  namespace: circleguard-master
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dashboard-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
