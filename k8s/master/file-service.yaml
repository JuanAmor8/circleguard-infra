apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-service
  namespace: circleguard-master
  annotations:
    kubernetes.io/change-cause: "Release ${RELEASE_VERSION}"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: file-service
  template:
    metadata:
      labels:
        app: file-service
        environment: production
    spec:
      containers:
      - name: file-service
        image: circleguard/file-service:${RELEASE_VERSION}
        ports:
        - containerPort: 8085
        envFrom:
        - configMapRef:
            name: file-service-config
        - secretRef:
            name: circleguard-secrets
        env:
        - name: LOGSTASH_HOST
          value: "logstash.observability.svc.cluster.local"
        - name: LOGSTASH_PORT
          value: "5000"
        - name: JAVA_OPTS
          value: "-Xmx256m -Xms128m -XX:+UseG1GC"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8085
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8085
          initialDelaySeconds: 15
          periodSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: file-service
  namespace: circleguard-master
  labels:
    app: file-service
spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 8085
    targetPort: 8085
    protocol: TCP
  selector:
    app: file-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: file-service-hpa
  namespace: circleguard-master
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: file-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
