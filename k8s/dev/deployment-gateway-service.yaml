apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: circleguard-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
      - name: gateway-service
        image: juanamor8/circleguard-gateway-service:latest
        ports:
        - containerPort: 8087
        envFrom:
        - configMapRef:
            name: gateway-service-config
        - secretRef:
            name: circleguard-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8087
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8087
          initialDelaySeconds: 30
          periodSeconds: 5
          failureThreshold: 3
