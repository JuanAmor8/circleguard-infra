apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: circleguard-dev
  labels:
    app: auth-service
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        environment: dev
    spec:
      containers:
      - name: auth-service
        image: stixk/circleguard-auth-service:dev-latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8180
        envFrom:
        - configMapRef:
            name: auth-service-config
        - secretRef:
            name: circleguard-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8180
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8180
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
