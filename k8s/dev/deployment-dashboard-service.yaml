apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-service
  namespace: circleguard-dev
  labels:
    app: dashboard-service
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-service
  template:
    metadata:
      labels:
        app: dashboard-service
        environment: dev
    spec:
      containers:
      - name: dashboard-service
        image: stixk/circleguard-dashboard-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8084
        envFrom:
        - configMapRef:
            name: dashboard-service-config
        - secretRef:
            name: circleguard-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8084
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8084
          initialDelaySeconds: 30
          periodSeconds: 5
          failureThreshold: 3
