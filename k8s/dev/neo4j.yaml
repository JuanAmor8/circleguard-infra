apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: circleguard-dev
spec:
  type: ClusterIP
  ports:
  - name: bolt
    port: 7687
    targetPort: 7687
  - name: http
    port: 7474
    targetPort: 7474
  selector:
    app: neo4j

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j
  namespace: circleguard-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      enableServiceLinks: false
      containers:
      - name: neo4j
        image: neo4j:5.26
        ports:
        - containerPort: 7687
        - containerPort: 7474
        env:
        - name: NEO4J_AUTH
          value: "neo4j/password"
        - name: NEO4J_PLUGINS
          value: '["apoc"]'