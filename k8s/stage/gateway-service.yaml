apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: circleguard-stage
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
      - name: gateway-service
        image: circleguard/gateway-service:stage-${BUILD_NUMBER}
        ports:
        - containerPort: 8087
        envFrom:
        - configMapRef:
            name: gateway-service-config
        - secretRef:
            name: circleguard-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: circleguard-stage
spec:
  type: LoadBalancer
  ports:
  - port: 8087
    targetPort: 8087
  selector:
    app: gateway-service
