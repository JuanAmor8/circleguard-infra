apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: circleguard-stage
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        environment: stage
    spec:
      containers:
      - name: auth-service
        image: circleguard/auth-service:stage-${BUILD_NUMBER}
        ports:
        - containerPort: 8180
        envFrom:
        - configMapRef:
            name: auth-service-config
        - secretRef:
            name: circleguard-secrets
        env:
        - name: JAVA_OPTS
          value: "-Xmx512m -Xms256m -XX:+UseG1GC"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8180
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8180
          initialDelaySeconds: 30
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: circleguard-stage
spec:
  type: ClusterIP
  ports:
  - port: 8180
    targetPort: 8180
  selector:
    app: auth-service
