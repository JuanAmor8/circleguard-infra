apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-service
  namespace: circleguard-stage
spec:
  replicas: 2
  selector:
    matchLabels:
      app: file-service
  template:
    metadata:
      labels:
        app: file-service
    spec:
      containers:
      - name: file-service
        image: circleguard/file-service:stage-${BUILD_NUMBER}
        ports:
        - containerPort: 8085
        envFrom:
        - configMapRef:
            name: file-service-config
        - secretRef:
            name: circleguard-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8085
          initialDelaySeconds: 30
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8085
          initialDelaySeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: file-service
  namespace: circleguard-stage
spec:
  type: ClusterIP
  ports:
  - port: 8085
    targetPort: 8085
  selector:
    app: file-service
