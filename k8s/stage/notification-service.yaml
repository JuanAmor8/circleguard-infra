apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: circleguard-stage
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: circleguard/notification-service:stage-${BUILD_NUMBER}
        ports:
        - containerPort: 8082
        envFrom:
        - configMapRef:
            name: notification-service-config
        - secretRef:
            name: circleguard-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: circleguard-stage
spec:
  type: ClusterIP
  ports:
  - port: 8082
    targetPort: 8082
  selector:
    app: notification-service
