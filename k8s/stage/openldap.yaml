apiVersion: v1
kind: Service
metadata:
  name: openldap
  namespace: circleguard-stage
spec:
  type: ClusterIP
  ports:
  - port: 389
    targetPort: 389
  selector:
    app: openldap

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openldap
  namespace: circleguard-stage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openldap
  template:
    metadata:
      labels:
        app: openldap
    spec:
      containers:
      - name: openldap
        image: osixia/openldap:1.5.0
        ports:
        - containerPort: 389
        env:
        - name: LDAP_ORGANISATION
          value: "CircleGuard"
        - name: LDAP_DOMAIN
          value: "circleguard.edu"
        - name: LDAP_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: circleguard-secrets
              key: LDAP_BIND_PASSWORD
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          tcpSocket:
            port: 389
          initialDelaySeconds: 10
          periodSeconds: 10
