apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: circleguard-stage
spec:
  replicas: 2
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
      - name: identity-service
        image: circleguard/identity-service:stage-${BUILD_NUMBER}
        ports:
        - containerPort: 8083
        envFrom:
        - configMapRef:
            name: identity-service-config
        - secretRef:
            name: circleguard-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: circleguard-stage
spec:
  type: ClusterIP
  ports:
  - port: 8083
    targetPort: 8083
  selector:
    app: identity-service
