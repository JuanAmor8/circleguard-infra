apiVersion: apps/v1
kind: Deployment
metadata:
  name: promotion-service
  namespace: circleguard-stage
spec:
  replicas: 2
  selector:
    matchLabels:
      app: promotion-service
  template:
    metadata:
      labels:
        app: promotion-service
    spec:
      containers:
      - name: promotion-service
        image: circleguard/promotion-service:stage-${BUILD_NUMBER}
        ports:
        - containerPort: 8088
        envFrom:
        - configMapRef:
            name: promotion-service-config
        - secretRef:
            name: circleguard-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: promotion-service
  namespace: circleguard-stage
spec:
  type: ClusterIP
  ports:
  - port: 8088
    targetPort: 8088
  selector:
    app: promotion-service
