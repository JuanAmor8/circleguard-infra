# Balanceador entre proveedores cloud (capa global, simula Azure Traffic
# Manager / Cloud DNS con health checks). Round-robin activo-activo entre
# el sitio "Azure" y el sitio "GCP"; si un cloud cae, el health check lo
# expulsa y el 100% del tráfico va al sobreviviente (failover automático).
global
    log stdout format raw local0

defaults
    mode http
    log global
    option httplog
    timeout connect 2s
    timeout client  10s
    timeout server  10s

frontend multicloud_in
    bind *:8090
    default_backend clouds

backend clouds
    balance roundrobin
    option httpchk GET /
    # host.docker.internal = puertos publicados por los clusters kind
    server azure host.docker.internal:31080 check inter 2s fall 2 rise 2
    server gcp   host.docker.internal:32080 check inter 2s fall 2 rise 2

listen stats
    bind *:8404
    stats enable
    stats uri /
    stats refresh 5s
