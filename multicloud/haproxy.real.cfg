# Balanceador entre proveedores cloud REALES (AKS + GKE). Igual rol que
# haproxy.cfg pero apunta a las IPs públicas reales de los gateways
# (Service type LoadBalancer) en vez de los NodePort de los clusters kind.
# Reemplazar AKS_PUBLIC_IP / GKE_PUBLIC_IP antes de arrancar (ver README).
global
    log stdout format raw local0

defaults
    mode http
    log global
    option httplog
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend multicloud_in
    bind *:8090
    default_backend clouds

backend clouds
    balance roundrobin
    option httpchk GET /actuator/health
    # IPs públicas reales (kubectl get svc gateway-service -o jsonpath=...):
    #   AKS:  -n circleguard-dev   GKE: -n circleguard-dr
    server azure AKS_PUBLIC_IP:8087 check inter 2s fall 2 rise 2
    server gcp   GKE_PUBLIC_IP:8087 check inter 2s fall 2 rise 2

listen stats
    bind *:8404
    stats enable
    stats uri /
    stats refresh 5s
