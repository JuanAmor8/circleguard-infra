# Workload desplegado en AMBOS clusters simulados; responde identificando
# el "cloud" que sirve la petición (se inyecta via CLOUD_PROVIDER al aplicar:
#   kubectl apply con sed/envsubst — ver multicloud/README.md).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-echo
  labels: { app: gateway-echo }
spec:
  replicas: 2
  selector: { matchLabels: { app: gateway-echo } }
  template:
    metadata: { labels: { app: gateway-echo } }
    spec:
      containers:
        - name: echo
          image: hashicorp/http-echo:1.0
          args:
            - "-listen=:8080"
            - "-text={\"service\":\"circleguard-gateway\",\"cloud\":\"${CLOUD_PROVIDER}\",\"status\":\"UP\"}"
          ports: [{ containerPort: 8080 }]
          readinessProbe:
            httpGet: { path: /, port: 8080 }
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-echo
spec:
  type: NodePort
  selector: { app: gateway-echo }
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
