groups:
  - name: circleguard-availability
    rules:
      - alert: ServiceDown
        expr: up{job="circleguard-services"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.service }} is down"
          description: "Prometheus cannot scrape {{ $labels.service }} for over 1 minute."

  - name: circleguard-latency-errors
    rules:
      - alert: HighRequestLatencyP95
        expr: histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le, service)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency on {{ $labels.service }}"
          description: "p95 request latency above 1s for 5 minutes on {{ $labels.service }}."

      - alert: HighHttp5xxErrorRate
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (service)
          /
          sum(rate(http_server_requests_seconds_count[5m])) by (service) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate on {{ $labels.service }}"
          description: "More than 5% of requests returned 5xx for 5 minutes on {{ $labels.service }}."

  - name: circleguard-resources
    rules:
      - alert: HighJvmHeapUsage
        expr: |
          sum(jvm_memory_used_bytes{area="heap"}) by (service)
          /
          sum(jvm_memory_max_bytes{area="heap"}) by (service) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM heap nearly exhausted on {{ $labels.service }}"
          description: "Heap usage above 90% for 5 minutes on {{ $labels.service }}."
