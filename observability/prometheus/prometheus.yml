global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # CircleGuard Spring Boot services. They expose Micrometer metrics at
  # /actuator/prometheus and run on the host, reached via host.docker.internal.
  - job_name: circleguard-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8180"]
        labels: {service: auth}
      - targets: ["host.docker.internal:8083"]
        labels: {service: identity}
      - targets: ["host.docker.internal:8087"]
        labels: {service: gateway}
      - targets: ["host.docker.internal:8086"]
        labels: {service: form}
      - targets: ["host.docker.internal:8088"]
        labels: {service: promotion}
      - targets: ["host.docker.internal:8082"]
        labels: {service: notification}
      - targets: ["host.docker.internal:8085"]
        labels: {service: file}
      - targets: ["host.docker.internal:8084"]
        labels: {service: dashboard}
