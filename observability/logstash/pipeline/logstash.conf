# Logstash pipeline: receive structured JSON logs from the Spring Boot
# services (Logback TCP appender, json_lines) and index them into
# Elasticsearch under a daily logstash-* index that Kibana/Grafana read.
input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # The logstash-logback-encoder already emits a JSON object per event,
  # so most fields arrive parsed. Normalize the service name field.
  if [appName] {
    mutate { rename => { "appName" => "service" } }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "logstash-%{+YYYY.MM.dd}"
  }
}
